name: 'Terraform Azure Policy'

on:
  push:
    branches: [ "main" ]

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_admin_password: ${{ secrets.VM_ADMIN_PASSWORD }} #this is connected with var.admin_password

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init
        working-directory: main

      - name: Import Resource Group
        working-directory: main
        run: |
          terraform state show azurerm_resource_group.rg 2>/dev/null && echo "already in state" || \
            terraform import azurerm_resource_group.rg \
              /subscriptions/$ARM_SUBSCRIPTION_ID/resourceGroups/rg-lab-responsibility

      - name: Terraform Plan
        run: terraform plan
        working-directory: main

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: main